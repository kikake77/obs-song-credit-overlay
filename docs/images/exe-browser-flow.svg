<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" role="img" aria-labelledby="title desc">
  <title id="title">Song Credit Manager for OBSの導入の流れ</title>
  <desc id="desc">管理アプリを起動し、OBSへブラウザソースを1個追加し、ボタンで曲を切り替える3段階の図</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#67e8f9"/>
    </marker>
  </defs>
  <rect width="1400" height="600" rx="34" fill="url(#bg)"/>
  <text x="60" y="70" fill="#f8fafc" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="34" font-weight="700">3ステップでOBSへ表示</text>
  <text x="60" y="108" fill="#94a3b8" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="20">Python設定も、テキストソース3個の作成も不要です</text>

  <g filter="url(#shadow)">
    <rect x="60" y="155" width="360" height="350" rx="24" fill="#f8fafc"/>
    <rect x="60" y="155" width="360" height="9" rx="5" fill="url(#accent)"/>
    <circle cx="110" cy="215" r="25" fill="#0891b2"/>
    <text x="110" y="224" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="25" font-weight="700">1</text>
    <text x="150" y="224" fill="#0f172a" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="27" font-weight="700">EXEを起動</text>
    <rect x="95" y="260" width="290" height="150" rx="14" fill="#e2e8f0" stroke="#cbd5e1"/>
    <rect x="95" y="260" width="290" height="30" rx="14" fill="#cbd5e1"/>
    <circle cx="113" cy="275" r="5" fill="#64748b"/>
    <text x="118" y="330" fill="#0f172a" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="18" font-weight="700">Song Credit Manager for OBS</text>
    <rect x="118" y="350" width="130" height="34" rx="8" fill="#0891b2"/>
    <text x="183" y="373" text-anchor="middle" fill="#fff" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="15">選択曲を表示</text>
    <text x="95" y="455" fill="#475569" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="19">表示サーバー：起動中</text>
  </g>

  <path d="M440 330 H485" stroke="#67e8f9" stroke-width="7" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="505" y="155" width="390" height="350" rx="24" fill="#f8fafc"/>
    <rect x="505" y="155" width="390" height="9" rx="5" fill="url(#accent)"/>
    <circle cx="555" cy="215" r="25" fill="#6366f1"/>
    <text x="555" y="224" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="25" font-weight="700">2</text>
    <text x="595" y="224" fill="#0f172a" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="27" font-weight="700">OBSへURLを登録</text>
    <rect x="540" y="270" width="320" height="72" rx="12" fill="#0f172a"/>
    <text x="560" y="300" fill="#94a3b8" font-family="Consolas, monospace" font-size="15">ブラウザソース</text>
    <text x="560" y="325" fill="#67e8f9" font-family="Consolas, monospace" font-size="14">127.0.0.1:17321/overlay</text>
    <rect x="540" y="365" width="150" height="62" rx="10" fill="#e2e8f0"/>
    <text x="557" y="390" fill="#475569" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="14">幅</text>
    <text x="557" y="416" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">1920</text>
    <rect x="710" y="365" width="150" height="62" rx="10" fill="#e2e8f0"/>
    <text x="727" y="390" fill="#475569" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="14">高さ</text>
    <text x="727" y="416" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">1080</text>
    <text x="540" y="465" fill="#475569" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="19">OBS側の設定は最初の1回だけ</text>
  </g>

  <path d="M915 330 H960" stroke="#67e8f9" stroke-width="7" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="980" y="155" width="360" height="350" rx="24" fill="#f8fafc"/>
    <rect x="980" y="155" width="360" height="9" rx="5" fill="url(#accent)"/>
    <circle cx="1030" cy="215" r="25" fill="#7c3aed"/>
    <text x="1030" y="224" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="25" font-weight="700">3</text>
    <text x="1070" y="224" fill="#0f172a" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="27" font-weight="700">曲を切り替える</text>
    <rect x="1015" y="270" width="290" height="158" rx="16" fill="#111827"/>
    <rect x="1015" y="270" width="7" height="158" rx="4" fill="#22d3ee"/>
    <text x="1045" y="325" fill="#fff" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="31" font-weight="700">祝福</text>
    <text x="1045" y="360" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="21">YOASOBI</text>
    <line x1="1045" y1="380" x2="1275" y2="380" stroke="#334155"/>
    <text x="1045" y="410" fill="#cbd5e1" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="16">作詞・作曲・編曲：Ayase</text>
    <text x="1015" y="465" fill="#475569" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="19">下部へ自動表示</text>
  </g>

  <text x="700" y="558" text-anchor="middle" fill="#cbd5e1" font-family="Segoe UI, Yu Gothic UI, sans-serif" font-size="20">配信前はセットリスト作成 ／ 配信中はボタン操作 ／ リクエスト曲は緊急表示</text>
</svg>
